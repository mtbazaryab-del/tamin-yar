<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تأمین‌یار</title>
  <style>
    :root{
      --navy:#0b2d5c;
      --navy2:#123b74;
      --gold:#d8a73b;
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --green:#047857;
      --red:#b91c1c;
      --amber:#b45309;
      --blueSoft:#eff6ff;
      --greenSoft:#ecfdf5;
      --redSoft:#fef2f2;
      --amberSoft:#fffbeb;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;direction:rtl;padding-bottom:90px}
    button,input,select,textarea{font-family:inherit}
    .topbar{position:sticky;top:0;z-index:20;background:var(--navy);color:white;box-shadow:0 12px 30px rgba(11,45,92,.18)}
    .topbar-inner{max-width:1150px;margin:auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .icon-btn{width:42px;height:42px;border:0;border-radius:16px;background:rgba(255,255,255,.12);color:white;display:grid;place-items:center;font-weight:900}
    .top-title{text-align:center}
    .top-title h1{font-size:20px;margin:0;font-weight:900}
    .top-title p{margin:4px 0 0;color:#bfdbfe;font-size:12px}
    .container{max-width:1150px;margin:auto;padding:18px 14px}
    .page{display:none}.page.active{display:block}
    .hero{position:relative;overflow:hidden;border-radius:32px;background:var(--navy);color:white;padding:26px;box-shadow:0 20px 45px rgba(11,45,92,.18)}
    .hero:before{content:"";position:absolute;left:-70px;top:-70px;width:180px;height:180px;background:rgba(216,167,59,.20);filter:blur(30px);border-radius:50%}
    .hero:after{content:"";position:absolute;right:80px;bottom:-120px;width:250px;height:250px;background:rgba(96,165,250,.22);filter:blur(40px);border-radius:50%}
    .hero-content{position:relative;z-index:1}
    .hero h2{font-size:34px;margin:0;font-weight:900}
    .hero p{color:#dbeafe;line-height:1.9;font-size:14px;max-width:650px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
    .stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:12px;text-align:center}
    .stat b{font-size:26px;display:block}
    .stat span{font-size:11px;color:#dbeafe}
    .panel{background:white;border:1px solid var(--line);border-radius:30px;padding:18px;box-shadow:0 1px 2px rgba(15,23,42,.04);margin-top:16px}
    .panel-title{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .panel-title .icon{width:44px;height:44px;border-radius:18px;background:var(--navy);color:white;display:grid;place-items:center}
    .panel-title h3{margin:0;color:var(--navy);font-size:18px;font-weight:900}
    .panel-title p{margin:4px 0 0;color:var(--muted);font-size:12px}
    .circle-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    @media(min-width:700px){.circle-menu{grid-template-columns:repeat(6,1fr)}}
    .circle-item{border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
    .circle{width:82px;height:82px;background:white;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;color:var(--navy);box-shadow:0 12px 28px rgba(15,23,42,.08);font-size:30px;transition:.2s}
    .circle-item:hover .circle{transform:translateY(-4px);background:var(--navy);color:white}
    .circle-item span{font-size:12px;font-weight:900;color:#334155}
    .grid-2{display:grid;grid-template-columns:1fr;gap:14px}
    .grid-3{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:800px){.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}}
    .form-grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:820px){.form-grid{grid-template-columns:1fr 1fr}}
    label span{display:block;font-size:13px;color:#334155;font-weight:900;margin-bottom:7px}
    .input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff;outline:none;font-size:14px}
    .input:focus{border-color:var(--navy);box-shadow:0 0 0 4px rgba(11,45,92,.10)}
    textarea.input{min-height:105px;resize:vertical}
    .btn{border:0;border-radius:16px;padding:12px 15px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
    .btn-primary{background:var(--navy);color:white}.btn-primary:hover{background:var(--navy2)}
    .btn-soft{background:#f1f5f9;color:#334155}.btn-soft:hover{background:#e2e8f0}
    .btn-danger{background:var(--redSoft);color:var(--red)}
    .btn-green{background:var(--greenSoft);color:var(--green)}
    .btn-amber{background:var(--amberSoft);color:var(--amber)}
    .btn-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:30}
    .bottom-inner{max-width:680px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:7px}
    .navbtn{border:0;border-radius:18px;background:transparent;color:#64748b;padding:8px 4px;font-size:11px;font-weight:900;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
    .navbtn.active{background:var(--navy);color:white}
    .card{background:white;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .card h4{font-size:17px;color:var(--navy);margin:0 0 6px;font-weight:900}
    .meta{font-size:12px;color:var(--muted);line-height:1.8}
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .tag{background:var(--blueSoft);color:var(--navy);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900}
    .status{border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900}
    .status.ok{background:var(--greenSoft);color:var(--green)}
    .status.warn{background:var(--amberSoft);color:var(--amber)}
    .status.bad{background:var(--redSoft);color:var(--red)}
    .status.new{background:var(--blueSoft);color:var(--navy)}
    .card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .line{display:flex;gap:8px;color:#475569;font-size:13px;line-height:1.8;margin-top:8px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .section-head h2{color:var(--navy);margin:0;font-size:22px;font-weight:900}
    .section-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .stepbar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:15px}
    .step{height:7px;border-radius:20px;background:#e2e8f0}.step.active{background:var(--gold)}
    .check-grid{display:grid;grid-template-columns:1fr;gap:8px}
    @media(min-width:620px){.check-grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:950px){.check-grid{grid-template-columns:repeat(3,1fr)}}
    .check-pill{border:1px solid var(--line);background:white;border-radius:16px;padding:11px 12px;font-size:13px;font-weight:900;color:#334155;display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-align:right}
    .check-pill.active{background:var(--navy);border-color:var(--navy);color:white}
    .mini-title{font-weight:900;color:var(--navy);margin:4px 0 10px}
    .selected-box{background:white;border:1px solid var(--line);border-radius:18px;padding:10px;font-size:13px;color:#475569;line-height:1.8;margin-top:8px}
    .hidden{display:none!important}
    .empty{border:1px dashed #cbd5e1;border-radius:26px;background:white;text-align:center;padding:30px;color:#64748b}
    .toast{position:fixed;bottom:95px;left:14px;background:var(--navy);color:white;border-radius:18px;padding:12px 16px;font-weight:900;z-index:60;box-shadow:0 15px 35px rgba(0,0,0,.2)}
    .export-card{background:#f8fafc;border:1px solid var(--line);border-radius:26px;padding:18px}
    .export-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  </style>
</head>

function uid(prefix){return prefix+"-"+Date.now()+"-"+Math.floor(Math.random()*100000)}
function norm(v){return String(v||"").trim().replace(/ي/g,"ی").replace(/ك/g,"ک").replace(/‌/g," ").toLowerCase()}
function today(){return new Date().toISOString().slice(0,10)}
function unique(a){return [...new Set((a||[]).filter(Boolean))]}
function join(a){return (a||[]).join("، ")}
function citiesOf(s){return unique((s.serviceAreas||[]).flatMap(a=>a.cities||[]))}
function areaLabel(s){return !s.serviceAreas?.length ? "—" : s.serviceAreas.map(a=>a.province+": "+join(a.cities)).join(" | ")}
function statusClass(s){if(["معتبر","همکاری موفق داشته‌ایم"].includes(s))return"ok";if(s==="نیازمند بررسی")return"warn";if(s==="نامعتبر")return"bad";return"new"}

 document.getElementById("search").innerHTML=`
 <div class="grid-2" style="grid-template-columns:minmax(280px,360px) 1fr">

function runSearch(){
 let p=norm(document.getElementById("qProduct")?.value), c=norm(document.getElementById("qCity")?.value), t=document.getElementById("qType")?.value||"", st=document.getElementById("qStatus")?.value||"";
 let res=data.suppliers.filter(s=>{
  let productOk=!p||(s.products||[]).some(x=>norm(x).includes(p)||p.includes(norm(x)));
  let cityList=citiesOf(s);
  let cityOk=!c||cityList.some(x=>norm(x).includes(c)||c.includes(norm(x)))||norm(s.mainCity).includes(c)||norm(s.mainProvince).includes(c);
  let typeOk=!t||(s.types||[]).includes(t);
  let statusOk=!st||s.reliability===st;
  return productOk&&cityOk&&typeOk&&statusOk;
 });
 document.getElementById("searchCount").textContent=res.length+" تأمین‌کننده یافت شد";
 document.getElementById("searchResults").innerHTML=res.length?res.map(supplierCard).join(""):`<div class="empty">نتیجه‌ای پیدا نشد.</div>`;
}

  <div class="line">👤 <div><b>تماس:</b> ${s.contactPerson||"—"} | ⭐ ${s.rating||0} از 5</div></div>

   ${s.mobile?`<a class="btn btn-primary" href="tel:${s.mobile}">☎️ تماس</a>`:""}
   ${s.whatsapp?`<a class="btn btn-green" href="https://wa.me/${String(s.whatsapp).replace(/\D/g,"")}" target="_blank">💬 واتساپ</a>`:""}

function newSupplier(){editingSupplierId=null;supplierStep=1;supplierDraft={name:"",types:[],mainProvince:"",mainCity:"",categories:[],products:[],serviceAreas:[],contactPerson:"",contactRole:"مدیر فروش",mobile:"",phone:"",whatsapp:"",website:"",paymentTerms:[],deliveryMethods:[],reliability:"جدید",rating:3,ratingReasons:[],lastContact:today(),notes:""};showPage("supplierForm")}
function editSupplier(id){editingSupplierId=id;supplierDraft=JSON.parse(JSON.stringify(data.suppliers.find(s=>s.id===id)));supplierStep=1;showPage("supplierForm")}

function renderSupplierForm(){
 let d=supplierDraft||{};
 let html=`<div class="panel"><div class="section-head"><div><h2>${editingSupplierId?"ویرایش تأمین‌کننده":"افزودن تأمین‌کننده"}</h2><p>مرحله ${supplierStep} از 7</p></div><button class="btn btn-soft" onclick="showPage('suppliers')">بستن</button></div><div class="stepbar">${Array.from({length:7}).map((_,i)=>`<div class="step ${i<supplierStep?"active":""}"></div>`).join("")}</div></div><div class="panel">`;
 if(supplierStep===1)html+=step1(d);
 if(supplierStep===2)html+=step2(d);
 if(supplierStep===3)html+=step3(d);
 if(supplierStep===4)html+=step4(d);
 if(supplierStep===5)html+=step5(d);
 if(supplierStep===6)html+=step6(d);
 if(supplierStep===7)html+=step7(d);
 html+=`<div class="btn-row" style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px;justify-content:space-between"><button class="btn btn-soft" onclick="prevSupplierStep()" ${supplierStep===1?"disabled":""}>قبلی</button>${supplierStep<7?`<button class="btn btn-primary" onclick="nextSupplierStep()">بعدی</button>`:`<button class="btn btn-primary" onclick="saveSupplier()">ذخیره تأمین‌کننده</button>`}</div></div>`;
 document.getElementById("supplierForm").innerHTML=html;
}
function updateSupplierField(k,v){supplierDraft[k]=v}
function toggleArr(obj,key,val){obj[key]=obj[key]||[];obj[key]=obj[key].includes(val)?obj[key].filter(x=>x!==val):[...obj[key],val]}
function pillGroup(title,options,selected,key){return `<div><div class="mini-title">${title}</div><div class="check-grid">${options.map(o=>`<button class="check-pill ${(selected||[]).includes(o)?"active":""}" onclick="toggleSupplier('${key}', '${encodeURIComponent(o)}')"><span>${o}</span>${(selected||[]).includes(o)?"✓":""}</button>`).join("")}</div></div>`}
function toggleSupplier(k,encoded){toggleArr(supplierDraft,k,decodeURIComponent(encoded));renderSupplierForm()}
function step1(d){return `<div class="form-grid"><label><span>نام شرکت / فروشنده</span><input class="input" value="${d.name||""}" oninput="updateSupplierField('name',this.value)" placeholder="مثلاً آذران پلاستیک"></label>${pillGroup("نوع تأمین‌کننده",supplierTypes,d.types,"types")}</div>`}
function step2(d){return pillGroup("دسته‌بندی‌های قابل تأمین",categories.map(c=>c.name),d.categories,"categories")}
function step3(d){let products=categories.filter(c=>(d.categories||[]).includes(c.name)).flatMap(c=>c.products);return `${pillGroup("محصولات قابل تأمین",products,d.products,"products")}<div class="selected-box"><b>افزودن محصول جدید</b><div class="btn-row" style="margin-top:8px"><input id="newProductInput" class="input" style="max-width:360px" placeholder="اگر محصول در لیست نبود"><button class="btn btn-primary" onclick="addSupplierProduct()">افزودن</button></div></div>`}
function addSupplierProduct(){let v=document.getElementById("newProductInput").value.trim();if(!v)return;supplierDraft.products=unique([...(supplierDraft.products||[]),v]);renderSupplierForm()}
function step4(d){let mainP=provinces.find(p=>p.name===d.mainProvince);return `<div class="form-grid"><label><span>استان محل فعالیت اصلی</span><select class="input" onchange="supplierDraft.mainProvince=this.value;supplierDraft.mainCity='';renderSupplierForm()">${provinceOptions(d.mainProvince)}</select></label><label><span>شهر محل فعالیت اصلی</span><select class="input" onchange="supplierDraft.mainCity=this.value">${cityOptions(d.mainProvince,d.mainCity)}</select></label></div><div class="panel" style="background:#f8fafc"><div class="mini-title">شهرهای قابل ارسال / تحت پوشش</div><div class="form-grid"><label><span>انتخاب استان</span><select id="serviceProvince" class="input" onchange="renderServiceCities()">${provinceOptions("")}</select></label><label><span>جستجوی شهر</span><input id="serviceCitySearch" class="input" oninput="renderServiceCities()" placeholder="مثلاً کرج"></label></div><div class="btn-row" style="margin-top:10px"><button class="btn btn-soft" onclick="selectAllServiceCities()">انتخاب همه شهرها</button><button class="btn btn-soft" onclick="clearServiceProvince()">پاک کردن این استان</button></div><div id="serviceCitiesBox" style="margin-top:12px"></div><div id="selectedServiceAreas" style="margin-top:12px">${selectedAreasHtml()}</div></div>`}
function selectedAreasHtml(){return (supplierDraft.serviceAreas||[]).map(a=>`<div class="selected-box"><b style="color:var(--navy)">${a.province}: </b>${join(a.cities)}</div>`).join("")}
function renderServiceCities(){let pn=document.getElementById("serviceProvince")?.value;let q=norm(document.getElementById("serviceCitySearch")?.value);let p=provinces.find(x=>x.name===pn);let box=document.getElementById("serviceCitiesBox");if(!p||!box){if(box)box.innerHTML="";return}let area=(supplierDraft.serviceAreas||[]).find(a=>a.province===pn);let selected=area?area.cities:[];box.innerHTML=`<div class="check-grid">${p.cities.filter(c=>norm(c).includes(q)).map(c=>`<button class="check-pill ${selected.includes(c)?"active":""}" onclick="toggleServiceCity('${pn}','${c}')"><span>${c}</span>${selected.includes(c)?"✓":""}</button>`).join("")}</div>`}
function toggleServiceCity(pn,city){let areas=supplierDraft.serviceAreas||[];let area=areas.find(a=>a.province===pn);if(area){area.cities=area.cities.includes(city)?area.cities.filter(c=>c!==city):[...area.cities,city];areas=areas.filter(a=>a.cities.length)}else areas.push({province:pn,cities:[city]});supplierDraft.serviceAreas=areas;renderServiceCities();document.getElementById("selectedServiceAreas").innerHTML=selectedAreasHtml()}
function selectAllServiceCities(){let pn=document.getElementById("serviceProvince")?.value;let p=provinces.find(x=>x.name===pn);if(!p)return;let areas=(supplierDraft.serviceAreas||[]).filter(a=>a.province!==pn);areas.push({province:pn,cities:[...p.cities]});supplierDraft.serviceAreas=areas;renderServiceCities();document.getElementById("selectedServiceAreas").innerHTML=selectedAreasHtml()}
function clearServiceProvince(){let pn=document.getElementById("serviceProvince")?.value;if(!pn)return;supplierDraft.serviceAreas=(supplierDraft.serviceAreas||[]).filter(a=>a.province!==pn);renderServiceCities();document.getElementById("selectedServiceAreas").innerHTML=selectedAreasHtml()}
function step5(d){return `<div class="form-grid"><label><span>نام شخص تماس</span><input class="input" value="${d.contactPerson||""}" oninput="updateSupplierField('contactPerson',this.value)"></label><label><span>سمت شخص تماس</span><select class="input" onchange="updateSupplierField('contactRole',this.value)">${optionList(["مدیرعامل","مدیر فروش","کارشناس فروش","مسئول دفتر","مسئول بازرگانی","مسئول فنی","انباردار","سایر"],d.contactRole)}</select></label><label><span>موبایل</span><input class="input" value="${d.mobile||""}" oninput="updateSupplierField('mobile',this.value)"></label><label><span>واتساپ</span><input class="input" value="${d.whatsapp||""}" oninput="updateSupplierField('whatsapp',this.value)"></label><label><span>تلفن ثابت</span><input class="input" value="${d.phone||""}" oninput="updateSupplierField('phone',this.value)"></label><label><span>وب‌سایت</span><input class="input" value="${d.website||""}" oninput="updateSupplierField('website',this.value)"></label></div>`}
function step6(d){return `<div class="grid-2">${pillGroup("شرایط پرداخت",paymentTerms,d.paymentTerms,"paymentTerms")}${pillGroup("روش ارسال",deliveryMethods,d.deliveryMethods,"deliveryMethods")}</div>`}
function step7(d){return `<div class="form-grid"><label><span>وضعیت اعتبار</span><select class="input" onchange="updateSupplierField('reliability',this.value)">${optionList(reliabilityStatuses,d.reliability)}</select></label><label><span>امتیاز ۱ تا ۵</span><input class="input" type="number" min="1" max="5" value="${d.rating||3}" oninput="updateSupplierField('rating',Number(this.value))"></label></div><br>${pillGroup("دلایل امتیاز",ratingReasons,d.ratingReasons,"ratingReasons")}<br><label><span>توضیحات</span><textarea class="input" oninput="updateSupplierField('notes',this.value)">${d.notes||""}</textarea></label>`}
function nextSupplierStep(){if(supplierStep===1&&!supplierDraft.name.trim())return toast("نام تأمین‌کننده را وارد کن");supplierStep++;renderSupplierForm();setTimeout(renderServiceCities,20)}
function prevSupplierStep(){supplierStep=Math.max(1,supplierStep-1);renderSupplierForm();setTimeout(renderServiceCities,20)}
function saveSupplier(){if(!supplierDraft.name.trim())return toast("نام تأمین‌کننده را وارد کن");if(editingSupplierId){data.suppliers=data.suppliers.map(s=>s.id===editingSupplierId?{...supplierDraft,id:editingSupplierId}:s)}else{data.suppliers=[{...supplierDraft,id:uid("SUP")},...data.suppliers]}saveData();toast("تأمین‌کننده ذخیره شد");showPage("suppliers")}

function renderCustomers(){
 document.getElementById("customers").innerHTML=`<div class="section-head"><div><h2>بانک مشتریان</h2><p>ثبت و مدیریت مشتریان و خریداران احتمالی</p></div><button class="btn btn-primary" onclick="newCustomer()">+ افزودن مشتری</button></div><div class="panel"><input id="customerSearch" class="input" oninput="renderCustomerList()" placeholder="جستجو در مشتریان..."></div><div id="customerList" class="grid-2"></div>`;
 renderCustomerList();
}
function renderCustomerList(){let q=norm(document.getElementById("customerSearch")?.value);let arr=data.customers.filter(c=>norm([c.name,c.type,c.city,join(c.productsNeeded)].join(" ")).includes(q));document.getElementById("customerList").innerHTML=arr.length?arr.map(customerCard).join(""):`<div class="empty">مشتری‌ای ثبت نشده است.</div>`}
function customerCard(c){return `<div class="card"><div class="card-head"><div><h4>${c.name}</h4><div class="meta">${c.type} | ${c.province||"—"} - ${c.city||"—"}</div></div><span class="status ok">${c.status||"جدید"}</span></div><div class="tags">${(c.productsNeeded||[]).map(p=>`<span class="tag">${p}</span>`).join("")}</div><div class="line">👤 <div><b>شخص تماس:</b> ${c.contactPerson||"—"}</div></div><div class="line">☎️ <div><b>موبایل:</b> ${c.mobile||"—"}</div></div><div class="btn-row" style="margin-top:14px">${c.mobile?`<a class="btn btn-primary" href="tel:${c.mobile}">تماس</a>`:""}<button class="btn btn-soft" onclick="editCustomer('${c.id}')">ویرایش</button><button class="btn btn-danger" onclick="deleteCustomer('${c.id}')">حذف</button></div></div>`}
function newCustomer(){editingCustomerId=null;customerDraft={name:"",type:"پیمانکار",province:"",city:"",productsNeeded:[],contactPerson:"",mobile:"",status:"جدید",notes:""};showPage("customerForm")}
function editCustomer(id){editingCustomerId=id;customerDraft=JSON.parse(JSON.stringify(data.customers.find(c=>c.id===id)));showPage("customerForm")}
function deleteCustomer(id){if(!confirm("این مشتری حذف شود؟"))return;data.customers=data.customers.filter(c=>c.id!==id);saveData();toast("حذف شد");renderAll()}
function renderCustomerForm(){
 let d=customerDraft||{};let p=provinces.find(x=>x.name===d.province);
 document.getElementById("customerForm").innerHTML=`<div class="panel"><div class="section-head"><div><h2>${editingCustomerId?"ویرایش مشتری":"افزودن مشتری"}</h2><p>اطلاعات مشتری را ساختاریافته وارد کن.</p></div><button class="btn btn-soft" onclick="showPage('customers')">بستن</button></div><div class="form-grid"><label><span>نام مشتری / سازمان</span><input class="input" value="${d.name||""}" oninput="customerDraft.name=this.value"></label><label><span>نوع مشتری</span><select class="input" onchange="customerDraft.type=this.value">${optionList(customerTypes,d.type)}</select></label><label><span>استان</span><select class="input" onchange="customerDraft.province=this.value;customerDraft.city='';renderCustomerForm()">${provinceOptions(d.province)}</select></label><label><span>شهر</span><select class="input" onchange="customerDraft.city=this.value">${cityOptions(d.province,d.city)}</select></label><label><span>شخص تماس</span><input class="input" value="${d.contactPerson||""}" oninput="customerDraft.contactPerson=this.value"></label><label><span>موبایل</span><input class="input" value="${d.mobile||""}" oninput="customerDraft.mobile=this.value"></label><label><span>وضعیت مشتری</span><select class="input" onchange="customerDraft.status=this.value">${optionList(customerStatuses,d.status)}</select></label><label><span>افزودن محصول موردنیاز</span><div class="btn-row"><input id="customerProductInput" class="input" placeholder="مثلاً سقف PVC"><button class="btn btn-primary" onclick="addCustomerProduct()">افزودن</button></div></label><label style="grid-column:1/-1"><span>توضیحات</span><textarea class="input" oninput="customerDraft.notes=this.value">${d.notes||""}</textarea></label></div><div class="tags">${(d.productsNeeded||[]).map(p=>`<span class="tag">${p}</span>`).join("")}</div><div class="btn-row" style="margin-top:18px"><button class="btn btn-primary" onclick="saveCustomer()">ذخیره مشتری</button></div></div>`;
}
function addCustomerProduct(){let v=document.getElementById("customerProductInput").value.trim();if(!v)return;customerDraft.productsNeeded=unique([...(customerDraft.productsNeeded||[]),v]);renderCustomerForm()}
function saveCustomer(){if(!customerDraft.name.trim())return toast("نام مشتری را وارد کن");if(editingCustomerId)data.customers=data.customers.map(c=>c.id===editingCustomerId?{...customerDraft,id:editingCustomerId}:c);else data.customers=[{...customerDraft,id:uid("CUS")},...data.customers];saveData();toast("مشتری ذخیره شد");showPage("customers")}

function renderProducts(){
 document.getElementById("products").innerHTML=`<div class="panel"><div class="panel-title"><div class="icon">📦</div><div><h3>بانک محصولات</h3><p>محصولات قابل انتخاب در فرم تأمین‌کننده</p></div></div><div class="grid-3"><input id="newProductName" class="input" placeholder="نام محصول جدید"><select id="newProductCat" class="input">${categories.map(c=>`<option>${c.name}</option>`).join("")}</select><button class="btn btn-primary" onclick="addProduct()">افزودن</button></div></div><div class="panel"><input id="productSearch" class="input" oninput="renderProductList()" placeholder="جستجو در محصولات..."></div><div id="productList" class="grid-3"></div>`;
 renderProductList();
}
function addProduct(){let name=document.getElementById("newProductName").value.trim();let category=document.getElementById("newProductCat").value;if(!name)return toast("نام محصول را وارد کن");data.products=[{id:uid("PRD"),name,category,unit:"",specs:""},...data.products];saveData();toast("محصول ثبت شد");renderProducts()}
function renderProductList(){let q=norm(document.getElementById("productSearch")?.value);let arr=data.products.filter(p=>norm([p.name,p.category].join(" ")).includes(q));document.getElementById("productList").innerHTML=arr.map(p=>`<div class="card"><h4>${p.name}</h4><div class="meta">${p.category}</div></div>`).join("")}

function renderInquiries(){
 document.getElementById("inquiries").innerHTML=`<div class="panel"><div class="panel-title"><div class="icon">📋</div><div><h3>ثبت استعلام</h3><p>نیاز مشتری را ثبت کن و بعد تأمین‌کننده مناسب را پیدا کن.</p></div></div><div class="form-grid"><label><span>نام مشتری</span><input id="inqCustomer" class="input"></label><label><span>نام کالا</span><input id="inqProduct" class="input"></label><label><span>مقدار</span><input id="inqQty" class="input"></label><label><span>شهر تحویل</span><input id="inqCity" class="input"></label><label><span>مهلت پاسخ</span><input id="inqDeadline" type="date" class="input"></label><label><span>وضعیت</span><select id="inqStatus" class="input">${optionList(inquiryStatuses,"جدید")}</select></label><label style="grid-column:1/-1"><span>توضیحات</span><textarea id="inqNotes" class="input"></textarea></label></div><div class="btn-row" style="margin-top:14px"><button class="btn btn-primary" onclick="saveInquiry()">ثبت استعلام</button></div></div><div id="inquiryList" class="grid-2"></div>`;
 renderInquiryList();
}
function saveInquiry(){let product=document.getElementById("inqProduct").value.trim();if(!product)return toast("نام کالا را وارد کن");data.inquiries=[{id:uid("INQ"),date:today(),customerName:document.getElementById("inqCustomer").value,product,quantity:document.getElementById("inqQty").value,deliveryCity:document.getElementById("inqCity").value,deadline:document.getElementById("inqDeadline").value,status:document.getElementById("inqStatus").value,notes:document.getElementById("inqNotes").value},...data.inquiries];saveData();toast("استعلام ثبت شد");renderInquiries()}
function renderInquiryList(){document.getElementById("inquiryList").innerHTML=data.inquiries.map(i=>`<div class="card"><h4>${i.product}</h4><div class="meta">${i.customerName||"بدون مشتری"} | ${i.deliveryCity||"—"} | ${i.status}</div><p class="meta">مقدار: ${i.quantity||"—"} | مهلت: ${i.deadline||"—"}</p></div>`).join("")}

function renderReports(){
 document.getElementById("reports").innerHTML=`<div class="panel"><div class="panel-title"><div class="icon">📊</div><div><h3>گزارش‌ها و خروجی</h3><p>خروجی PDF و Excel از تأمین‌کنندگان و مشتریان</p></div></div><div class="grid-2"><div class="export-card"><h3>خروجی تأمین‌کنندگان</h3><p class="meta">تعداد رکورد: ${data.suppliers.length}</p><div class="export-grid"><button class="btn btn-danger" onclick="exportSuppliersPDF()">📄 خروجی PDF</button><button class="btn btn-green" onclick="exportSuppliersExcel()">📗 خروجی Excel</button></div></div><div class="export-card"><h3>خروجی مشتریان</h3><p class="meta">تعداد رکورد: ${data.customers.length}</p><div class="export-grid"><button class="btn btn-danger" onclick="exportCustomersPDF()">📄 خروجی PDF</button><button class="btn btn-green" onclick="exportCustomersExcel()">📗 خروجی Excel</button></div></div></div></div>`;
}
function download(filename,content,type){let blob=new Blob([content],{type});let url=URL.createObjectURL(blob);let a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function excel(title,rows,cols,file){let html=`<html dir="rtl"><head><meta charset="UTF-8"></head><body><table border="1"><tr><th colspan="${cols.length}">${title}</th></tr><tr>${cols.map(c=>`<th>${c.label}</th>`).join("")}</tr>${rows.map(r=>`<tr>${cols.map(c=>`<td>${String(c.val(r)||"").replace(/</g,"&lt;")}</td>`).join("")}</tr>`).join("")}</table></body></html>`;download(file+".xls",html,"application/vnd.ms-excel;charset=utf-8")}
function pdf(title,rows,cols){let html=`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:Tahoma;padding:22px;direction:rtl}h1{color:#0b2d5c}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#0b2d5c;color:#fff}td,th{border:1px solid #ddd;padding:7px}</style></head><body><h1>${title}</h1><p>تاریخ گزارش: ${new Date().toLocaleDateString("fa-IR")}</p><table><tr>${cols.map(c=>`<th>${c.label}</th>`).join("")}</tr>${rows.map(r=>`<tr>${cols.map(c=>`<td>${String(c.val(r)||"").replace(/</g,"&lt;")}</td>`).join("")}</tr>`).join("")}</table><script>window.onload=function(){window.print()}<\/script></body></html>`;let w=window.open("","_blank");w.document.write(html);w.document.close()}
const supplierCols=[{label:"نام",val:s=>s.name},{label:"نوع",val:s=>join(s.types)},{label:"استان اصلی",val:s=>s.mainProvince},{label:"شهر اصلی",val:s=>s.mainCity},{label:"محصولات",val:s=>join(s.products)},{label:"شهرهای پوشش",val:s=>areaLabel(s)},{label:"شخص تماس",val:s=>s.contactPerson},{label:"موبایل",val:s=>s.mobile},{label:"واتساپ",val:s=>s.whatsapp},{label:"اعتبار",val:s=>s.reliability},{label:"امتیاز",val:s=>s.rating},{label:"توضیحات",val:s=>s.notes}];
const customerCols=[{label:"نام",val:c=>c.name},{label:"نوع",val:c=>c.type},{label:"استان",val:c=>c.province},{label:"شهر",val:c=>c.city},{label:"محصولات موردنیاز",val:c=>join(c.productsNeeded)},{label:"شخص تماس",val:c=>c.contactPerson},{label:"موبایل",val:c=>c.mobile},{label:"وضعیت",val:c=>c.status},{label:"توضیحات",val:c=>c.notes}];
function exportSuppliersExcel(){excel("گزارش تأمین‌کنندگان",data.suppliers,supplierCols,"suppliers-report")}
function exportCustomersExcel(){excel("گزارش مشتریان",data.customers,customerCols,"customers-report")}
function exportSuppliersPDF(){pdf("گزارش تأمین‌کنندگان",data.suppliers,supplierCols)}
function exportCustomersPDF(){pdf("گزارش مشتریان",data.customers,customerCols)}

function renderSettings(){
 document.getElementById("settings").innerHTML=`<div class="panel"><div class="panel-title"><div class="icon">☰</div><div><h3>تنظیمات</h3><p>مدیریت داده‌های اپ</p></div></div><div class="btn-row"><button class="btn btn-soft" onclick="loadSamples()">بارگذاری نمونه</button><button class="btn btn-danger" onclick="resetAll()">حذف همه اطلاعات</button></div></div>`;
}
function resetAll(){if(!confirm("همه اطلاعات حذف شود؟"))return;data={suppliers:[],customers:[],products:[],inquiries:[]};saveData();toast("اطلاعات حذف شد");renderAll()}
function loadSamples(){data=JSON.parse(JSON.stringify(seedData));saveData();toast("داده نمونه بارگذاری شد");renderAll()}

const originalShowPage = showPage;
showPage = function(id){ originalShowPage(id); if(id==="supplierForm") { renderSupplierForm(); setTimeout(renderServiceCities,20); } if(id==="customerForm") renderCustomerForm(); };

renderAll();
</script>
</body>
</html>
